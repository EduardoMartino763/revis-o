<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>FatecShop</title>
        <link rel="stylesheet" href="css/estilos.css">
    </head>
    <body>
        <header>
            <img>
            <h1>FatecShop</h1>
            <p>Aqui tudo é mais barato!</p>
        </header>
        <nav>
            <ul>
                <li>Início</li>
                <li>Produtos</li>
                <li>Ofertas</li>
                <li>Lançamentos</li>
                <li>Carrinho</li>
                <li>Ajuda</li>
            </ul>
        </nav>
        <main>
            <h2>Lançamentos</h2>
            <section id="lancamentos">
                <div class="card">
                    <img>
                    <h3>Notebook Lenovo</h3>
                    <p>Notebook Intel i5 8gb RAM</p>
                    <span>R$ 2.999,90</span>
                    <button>COMPRAR</button>
                </div>
            </section>

            <h2>Ofertas</h2>
            <section id="ofertas">

            </section>
        </main>
        <footer>
            <div id="redes">
                <ul>
                    <li>Instagram</li>
                    <li>Facebook</li>
                    <li>TikTok</li>
                </ul>
            </div>
            <address>
                Av. Imaginária, 232 - Marília - SP
            </address>
        </footer>
    </body>
</html>
